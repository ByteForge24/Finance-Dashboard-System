<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Finance Dashboard System</title>
<!-- Fonts (exact from Stitch) -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<!-- Material Symbols (exact from Stitch) -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<!-- Tailwind CDN (exact from Stitch) -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config (exact from Stitch design system) -->
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#6ffbbe",
                    "on-secondary-fixed": "#001a42",
                    "primary-fixed": "#dbe1ff",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-surface": "#151c27",
                    "inverse-primary": "#b4c5ff",
                    "on-tertiary-fixed": "#002113",
                    "error": "#ba1a1a",
                    "surface-container": "#e7eefe",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f0f3ff",
                    "surface": "#f9f9ff",
                    "surface-container-highest": "#dce2f3",
                    "background": "#f9f9ff",
                    "on-secondary-container": "#fefcff",
                    "inverse-surface": "#2a313d",
                    "tertiary-container": "#007d55",
                    "surface-tint": "#0053db",
                    "secondary-container": "#2170e4",
                    "on-background": "#151c27",
                    "secondary-fixed-dim": "#adc6ff",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#bdffdb",
                    "on-surface-variant": "#434655",
                    "surface-bright": "#f9f9ff",
                    "outline-variant": "#c3c6d7",
                    "on-error-container": "#93000a",
                    "tertiary": "#006242",
                    "on-primary-container": "#eeefff",
                    "secondary-fixed": "#d8e2ff",
                    "inverse-on-surface": "#ebf1ff",
                    "on-error": "#ffffff",
                    "surface-container-high": "#e2e8f8",
                    "primary": "#004ac6",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#b4c5ff",
                    "primary-container": "#2563eb",
                    "outline": "#737686",
                    "on-primary-fixed": "#00174b",
                    "secondary": "#0058be",
                    "tertiary-fixed-dim": "#4edea3",
                    "surface-variant": "#dce2f3",
                    "surface-dim": "#d3daea",
                    "on-tertiary-fixed-variant": "#005236",
                    "on-secondary-fixed-variant": "#004395"
                },
                "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.5rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
                },
                "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Space Grotesk"]
                }
            },
        },
    }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
    }
    .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }
    .glass-overlay {
        backdrop-filter: blur(12px);
        background: rgba(249, 249, 255, 0.7);
    }
    .data-value { font-family: 'Space Grotesk', sans-serif; }
    .data-font { font-family: 'Space Grotesk', sans-serif; }
    .font-headline { font-family: 'Manrope', sans-serif; }
    .font-label { font-family: 'Space Grotesk', sans-serif; }
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    .btn-gradient {
        background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #dce2f3; border-radius: 10px; }
    /* Toast styles */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; color: white; animation: slideIn 0.3s ease; min-width: 280px; display: flex; align-items: center; gap: 8px; box-shadow: 0 12px 40px rgba(21,28,39,0.15); }
    .toast-success { background: #006242; }
    .toast-error { background: #ba1a1a; }
    .toast-info { background: #004ac6; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    /* Skeleton loading */
    .skeleton { background: linear-gradient(90deg, #e2e8f8 25%, #f0f3ff 50%, #e2e8f8 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    /* Modal animation */
    .modal-backdrop { animation: fadeIn 0.2s ease; }
    .modal-content { animation: scaleIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body class="bg-background text-on-surface font-body">
<div id="app"></div>
<div id="toast-container" class="toast-container"></div>
<div id="modal-container"></div>
<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
